name: Spellcheck

on:
  pull_request:
    paths:
      - 'Chapters/**/*.tex'
  push:
    paths:
      - 'Chapters/**/*.tex'
  workflow_dispatch:

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install aspell
        run: sudo apt-get update && sudo apt-get install -y aspell aspell-en

      - name: Find changed .tex files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            # Push: compare against parent commit(s)
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi

          FILES=$(git diff --name-only "$BASE" "$HEAD" -- 'Chapters/**/*.tex' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ -z "$FILES" ]; then
            echo "No .tex files changed."
          else
            echo "Changed files:"
            echo "$FILES"
          fi

      - name: Run spellcheck
        if: steps.changed.outputs.files != ''
        run: |
          MISSPELLED=0

          # Load custom wordlist if it exists
          ASPELL_OPTS="--mode=tex --lang=en_US"
          if [ -f .aspell.en.pws ]; then
            ASPELL_OPTS="$ASPELL_OPTS --personal=./.aspell.en.pws"
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            WORDS=$(aspell $ASPELL_OPTS list < "$file" | sort -u)
            if [ -n "$WORDS" ]; then
              echo "::group::Misspelled words in $file"
              echo "$WORDS"
              echo "::endgroup::"
              MISSPELLED=1
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          if [ "$MISSPELLED" -eq 1 ]; then
            echo ""
            echo "::warning::Misspelled words found. Add valid words to .aspell.en.pws to suppress false positives."
            exit 1
          else
            echo "No misspelled words found."
          fi
