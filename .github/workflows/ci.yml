name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install codespell
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install codespell

      - name: Run spell check on all files
        shell: bash
        run: |
          set -euo pipefail
          codespell --check-filenames --ignore-words-list="nd,multline,alph,dne,vise,leaded,trough,ream,te,oint,2st,bu" --skip="*.ai,*.pdf,*.svg" .

  build-changed:
    name: Build Changed Chapters
    runs-on: ubuntu-latest
    needs: [spell-check]
    timeout-minutes: 120
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      chapter_count: ${{ steps.detect.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Detect changed chapter IDs
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            base_sha="$(git rev-parse "${{ github.sha }}^" 2>/dev/null || true)"
            head_sha="${{ github.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only --root -r "$head_sha")"
          else
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          fi

          echo "Changed files considered for chapter rebuild:"
          echo "$changed_files"

          declare -A chapters=()

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" =~ ^Chapters/([^/]+)/ ]]; then
              chapter_id="${BASH_REMATCH[1]}"
              chapters["$chapter_id"]=1
              continue
            fi

            if [[ "$file" =~ ^Chapters/book_[0-9]{2}\.txt$ && -f "$file" ]]; then
              while IFS= read -r line; do
                chapter_id="$(echo "$line" | xargs)"
                if [[ -n "$chapter_id" && ! "$chapter_id" =~ ^# ]]; then
                  chapters["$chapter_id"]=1
                fi
              done < "$file"
            fi
          done <<< "$changed_files"

          count="${#chapters[@]}"
          if [[ "$count" -gt 0 ]]; then
            has_changes=true
          else
            has_changes=false
          fi

          {
            echo "chapters<<EOF"
            for chapter in "${!chapters[@]}"; do
              echo "$chapter"
            done | sort
            echo "EOF"
            echo "count=$count"
            echo "has_changes=$has_changes"
          } >> "$GITHUB_OUTPUT"

          echo "Detected $count chapter(s)."

      - name: Skip when no chapters changed
        if: steps.detect.outputs.has_changes != 'true'
        run: echo "No chapter-related changes found for this run."

      - name: Restore apt cache
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/cache/restore@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Restore pip cache
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install LaTeX and Python dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments \
            rsync
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Verify LaTeX tools
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        if: steps.detect.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json

          cfg = {
              "Languages": ["en_US"],
              "Paper": "Letter",
              "LatexExecutable": "lualatex",
          }
          with open("Build/user.cfg", "w", encoding="utf-8") as fp:
              json.dump(cfg, fp, indent=2)
          print("Created Build/user.cfg")
          PY

      - name: Build changed chapters
        if: steps.detect.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Build/ci-artifacts

          while IFS= read -r chapter; do
            [[ -z "$chapter" ]] && continue
            chapter_dir="Chapters/$chapter/en_US"
            tex_file="$chapter_dir/student.tex"

            if [[ ! -f "$tex_file" ]]; then
              echo "Skipping $chapter: $tex_file not found"
              continue
            fi

            echo "Building chapter: $chapter"
            (
              cd "$chapter_dir"
              python3 ../../../Build/build_chapter.py
            )

            if [[ -f "$chapter_dir/student.pdf" ]]; then
              cp "$chapter_dir/student.pdf" "Build/ci-artifacts/${chapter}.pdf"
            else
              echo "Build did not produce PDF for $chapter"
              exit 1
            fi
          done <<< "${{ steps.detect.outputs.chapters }}"

      - name: Save apt cache
        if: always() && steps.detect.outputs.has_changes == 'true'
        uses: actions/cache/save@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}

      - name: Save pip cache
        if: always() && steps.detect.outputs.has_changes == 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Build/requirements.txt') }}

      - name: Upload changed chapters artifact
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changed-chapters-${{ github.sha }}
          path: Build/ci-artifacts/*.pdf
          if-no-files-found: error

  deploy:
    name: Deploy Changed Chapters
    runs-on: ubuntu-latest
    needs: [build-changed]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') && needs.build-changed.outputs.has_changes == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download changed chapters artifact
        uses: actions/download-artifact@v4
        with:
          name: changed-chapters-${{ github.sha }}
          path: chapters/

      - name: Set deploy timestamp
        id: ts
        run: echo "ts=$(date -u +'%Y-%m-%d %H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Deploy changed chapter PDFs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository-name: kontinuafoundation/kontinuafoundation.github.io
          branch: main
          folder: chapters
          target-folder: public
          clean: false
          force: false
          commit-message: "Deploy changed chapters: ${{ steps.ts.outputs.ts }}"
