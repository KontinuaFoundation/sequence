name: CI

run-name: "CI · ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install codespell
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install codespell

      - name: Run spell check on all files
        shell: bash
        run: |
          set -euo pipefail
          tail -n +2 .aspell.en.pws \
            | sed '/^[[:space:]]*$/d' \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u > /tmp/codespell-ignore-words.txt

          codespell --check-filenames --ignore-words=/tmp/codespell-ignore-words.txt --skip="*.ai,*.pdf,*.svg" .

  build-changed:
    name: Build Changed Files
    runs-on: ubuntu-latest
    needs: [spell-check]
    timeout-minutes: 120
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      chapter_count: ${{ steps.detect.outputs.chapter_count }}
      workbook_count: ${{ steps.detect.outputs.workbook_count }}
      digital_resources_changed: ${{ steps.detect.outputs.digital_resources_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Concatenate chapters
        run: |
          set -euo pipefail
          cd Chapters
          : > book_00.txt
          for i in $(seq -w 1 36); do
            cat "book_$i.txt" >> book_00.txt
          done
          
      - name: Detect changed chapter IDs
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            base_sha="$(git rev-parse "${{ github.sha }}^" 2>/dev/null || true)"
            head_sha="${{ github.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only --root -r "$head_sha")"
          else
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          fi

          echo "Changed files considered for chapter rebuild:"
          echo "$changed_files"

          declare -A chapters=()
          declare -A workbooks=()
          digital_resources_changed=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" =~ digital_resources\.json$ ]]; then
              digital_resources_changed=true
            fi

            if [[ "$file" =~ ^Chapters/([^/]+)/ ]]; then
              chapter_id="${BASH_REMATCH[1]}"
              chapters["$chapter_id"]=1
              continue
            fi

            if [[ "$file" =~ ^Chapters/book_[0-9]{2}\.txt$ && -f "$file" ]]; then
              while IFS= read -r line; do
                chapter_id="$(echo "$line" | xargs)"
                if [[ -n "$chapter_id" && ! "$chapter_id" =~ ^# ]]; then
                  chapters["$chapter_id"]=1
                fi
              done < "$file"
            fi
          done <<< "$changed_files"

          for book_file in Chapters/book_*.txt; do
            [[ -f "$book_file" ]] || continue

            workbook_id="$(basename "$book_file" .txt)"

            while IFS= read -r line; do
              chapter_id="$(echo "$line" | xargs)"

              [[ -z "$chapter_id" ]] && continue
              [[ "$chapter_id" =~ ^# ]] && continue

              if [[ -n "${chapters[$chapter_id]+x}" ]]; then
                if [[ "$workbook_id" != "book_00" ]]; then
                  workbooks["$workbook_id"]=1
                fi
              fi
            done < "$book_file"
          done  

          chapter_count="${#chapters[@]}"
          workbook_count="${#workbooks[@]}"

          if [[ "$chapter_count" -gt 0 || "$workbook_count" -gt 0 ]]; then
            has_changes=true
          else
            has_changes=false
          fi

          {
            echo "chapters<<EOF"
            for chapter in "${!chapters[@]}"; do
              echo "$chapter"
            done | sort
            echo "EOF"

            echo "workbooks<<EOF"
            for workbook in "${!workbooks[@]}"; do
              echo "$workbook"
            done | sort
            echo "EOF"

            echo "chapter_count=$chapter_count"
            echo "workbook_count=$workbook_count"
            echo "has_changes=$has_changes"
            echo "digital_resources_changed=$digital_resources_changed"
          } >> "$GITHUB_OUTPUT"

          echo "Detected $chapter_count chapter(s):"
          for chapter in "${!chapters[@]}"; do
            echo "$chapter"
          done | sort

          echo "Detected $workbook_count workbook(s):"
          for workbook in "${!workbooks[@]}"; do
            echo "$workbook"
          done | sort

      - name: Skip when no chapters changed
        if: steps.detect.outputs.has_changes != 'true'
        run: echo "No chapter-related changes found for this run."

      - name: Restore apt cache
        if: steps.detect.outputs.has_changes == 'true' || steps.detect.outputs.digital_resources_changed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Restore pip cache
        if: steps.detect.outputs.has_changes == 'true' || steps.detect.outputs.digital_resources_changed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install LaTeX and Python dependencies
        if: steps.detect.outputs.has_changes == 'true' || steps.detect.outputs.digital_resources_changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments \
            rsync
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Verify LaTeX tools
        if: steps.detect.outputs.has_changes == 'true' || steps.detect.outputs.digital_resources_changed == 'true'
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        if: steps.detect.outputs.has_changes == 'true' || steps.detect.outputs.digital_resources_changed == 'true'
        run: python3 Build/create_user_config.py

      - name: Build changed chapters
        if: steps.detect.outputs.has_changes == 'true' 
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Build/ci-artifacts

          while IFS= read -r chapter; do
            [[ -z "$chapter" ]] && continue
            chapter_dir="Chapters/$chapter/en_US"
            tex_file="$chapter_dir/student.tex"

            if [[ ! -f "$tex_file" ]]; then
              echo "Skipping $chapter: $tex_file not found"
              continue
            fi

            echo "Building chapter: $chapter"
            (
              cd "$chapter_dir"
              python3 ../../../Build/build_chapter.py
            )

            if [[ -f "$chapter_dir/student.pdf" ]]; then
              cp "$chapter_dir/student.pdf" "Build/ci-artifacts/${chapter}.pdf"
            else
              echo "Build did not produce PDF for $chapter"
              exit 1
            fi
          done <<< "${{ steps.detect.outputs.chapters }}"

      - name: Build changed workbooks
        if: steps.detect.outputs.has_changes == 'true' 
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Build/ci-artifacts

                 while IFS= read -r workbook; do
            [[ -z "$workbook" ]] && continue

            # skip book_00 if desired
            [[ "$workbook" == "book_00" ]] && continue

            workbook_number="${workbook#book_}"

            echo "Building workbook: $workbook_number"

            (
              cd Build
              python3 build_workbook.py "$workbook_number"
            )

            pdf_path="Build/Workbooks-en_US-Letter/workbook-${workbook_number}.pdf"

            if [[ -f "$pdf_path" ]]; then
              cp "$pdf_path" "Build/ci-artifacts/workbook-${workbook_number}.pdf"
            else
              echo "Missing expected PDF: $pdf_path"
              ls -R Build || true
              exit 1
            fi
          done <<< "${{ steps.detect.outputs.workbooks }}"

      - name: Save apt cache 
        if: always() && steps.detect.outputs.has_changes == 'true' || steps.detect.outputs.digital_resources_changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}

      - name: Save pip cache
        if: always() && steps.detect.outputs.has_changes == 'true'  || steps.detect.outputs.digital_resources_changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Build/requirements.txt') }}

      - name: Upload changed PDFs artifact
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changed-pdfs-${{ github.sha }}
          path: Build/ci-artifacts/*.pdf
          if-no-files-found: error

  gather-resources:
    name: Gather Link Resources
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-changed]
    if: >
      needs.build-changed.outputs.has_changes == 'true' ||
      needs.build-changed.outputs.digital_resources_changed == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Fetch Links.json from deployed site
        run: |
          set -euo pipefail
          mkdir -p Build/Resources-en_US

          TEMP_LINKS="/tmp/Links.json.tmp"
          rm -f "$TEMP_LINKS"

          if curl -f -L \
            https://raw.githubusercontent.com/KontinuaFoundation/kontinuafoundation.github.io/main/public/Links.json \
            -o "$TEMP_LINKS" 2>/dev/null; then

            if python3 -c "import json; json.load(open('$TEMP_LINKS'))" 2>/dev/null; then
              mv "$TEMP_LINKS" Build/Resources-en_US/Links.json
            else
              echo "{}" > Build/Resources-en_US/Links.json
              rm -f "$TEMP_LINKS"
            fi
          else
            echo "{}" > Build/Resources-en_US/Links.json
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Run resource pipeline
        run: |
          set -euo pipefail
          cd Build

          python3 create_user_config.py
          python3 gather_resources.py 90
          test -f Resources-en_US/Links.json

      - name: Upload gathered links
        uses: actions/upload-artifact@v4
        with:
          name: gathered-links-${{ github.sha }}
          path: Build/Resources-en_US/Links.json
          if-no-files-found: error

  build-resource-indexes:
    name: Build Resource Indexes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-changed, gather-resources]
    if: >
      always() &&
      needs.build-changed.result == 'success' &&
      (needs.gather-resources.result == 'success' ||
      needs.gather-resources.result == 'skipped')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Download gathered links
        if: needs.gather-resources.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: gathered-links-${{ github.sha }}
          path: Build/Resources-en_US/

      - name: Fetch Links.json from deployed site
        if: needs.gather-resources.result != 'success'
        run: |
          set -euo pipefail
          mkdir -p Build/Resources-en_US

          TEMP_LINKS="/tmp/Links.json.tmp"
          rm -f "$TEMP_LINKS"

          if curl -f -L \
            https://raw.githubusercontent.com/KontinuaFoundation/kontinuafoundation.github.io/main/public/Links.json \
            -o "$TEMP_LINKS" 2>/dev/null; then

            if python3 -c "import json; json.load(open('$TEMP_LINKS'))" 2>/dev/null; then
              mv "$TEMP_LINKS" Build/Resources-en_US/Links.json
            else
              echo "{}" > Build/Resources-en_US/Links.json
              rm -f "$TEMP_LINKS"
            fi
          else
            echo "{}" > Build/Resources-en_US/Links.json
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Build indexes
        run: |
          set -euo pipefail
          cd Build
          mkdir -p ci-artifacts

          python3 create_user_config.py
          python3 build_workbooks_index.py
          python3 generate_chapter_graph.py

          cp Resources-en_US/Links.json ci-artifacts/Links.json
          cp Resources-en_US/workbooks.json ci-artifacts/workbooks.json
          cp Workbooks-en_US-Letter/graph.json ci-artifacts/graph.json

      - name: Upload resource indexes
        uses: actions/upload-artifact@v4
        with:
          name: resource-indexes-${{ github.sha }}
          path: Build/ci-artifacts/*.json
          if-no-files-found: error

  deploy:
    name: Deploy Changed Files
    runs-on: ubuntu-latest
    needs: [build-changed, build-resource-indexes]
    if: >
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch') &&
      needs.build-resource-indexes.result == 'success'
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create deploy staging directory
        run: mkdir -p deploy-public

      - name: Download changed PDFs artifact (workbooks + chapters)
        if: needs.build-changed.outputs.has_changes == 'true'
        uses: actions/download-artifact@v4
        with:
          name: changed-pdfs-${{ github.sha }}
          path: deploy-public/

      - name: Download gathered resources artifact
        uses: actions/download-artifact@v4
        with:
          name: resource-indexes-${{ github.sha }}
          path: deploy-public/

      - name: Verify deployment payload
        run: |
          set -euo pipefail
          test -f deploy-public/workbooks.json
          python3 -c "import json; json.load(open('deploy-public/workbooks.json'))"

      - name: Set deploy timestamp
        id: ts
        run: echo "ts=$(date -u +'%Y-%m-%d %H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Deploy changed files to kontinuafoundation.github.io
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository-name: kontinuafoundation/kontinuafoundation.github.io
          branch: main
          folder: deploy-public
          target-folder: public
          clean: false
          force: false
          commit-message: "Deploy changed site files: ${{ steps.ts.outputs.ts }}"
          git-config-name: github-actions[bot]
          git-config-email: 41898282+github-actions[bot]@users.noreply.github.com
