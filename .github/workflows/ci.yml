name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install codespell
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install codespell

      - name: Run spell check on all files
        shell: bash
        run: |
          set -euo pipefail
          codespell --check-filenames --ignore-words-list="nd,multline,alph,dne,vise,leaded,trough,ream,te,oint,2st,bu" --skip="*.ai,*.pdf,*.svg" .

  build-all:
    name: Build All
    runs-on: ubuntu-latest
    needs: [spell-check]
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore apt cache
        uses: actions/cache/restore@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Restore pip cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install LaTeX and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments \
            rsync
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Verify LaTeX tools
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json

          cfg = {
              "Languages": ["en_US"],
              "Paper": "Letter",
              "LatexExecutable": "lualatex",
          }
          with open("Build/user.cfg", "w", encoding="utf-8") as fp:
              json.dump(cfg, fp, indent=2)
          print("Created Build/user.cfg")
          PY

      - name: Build all chapters
        shell: bash
        run: |
          set -euo pipefail
          cd Build
          python3 make_chapter_pdfs.py en_US --force

      - name: Build all workbooks
        shell: bash
        run: |
          set -euo pipefail
          cd Build
          python3 build_workbook.py all

      - name: Ensure resources directory exists
        run: |
          set -euo pipefail
          mkdir -p Build/Resources-en_US

      - name: Restore Links.json cache
        uses: actions/cache/restore@v4
        with:
          path: Build/Resources-en_US/Links.json
          key: links-en_US-${{ hashFiles('Chapters/**') }}

      - name: Run gather and URL checks
        shell: bash
        run: |
          set -euo pipefail
          cd Build
          python3 gather_resources.py
          python3 url_check.py 90
          test -f Resources-en_US/Links.json

      - name: Concatenate chapters
        run: bash Build/concat_chaps.bash

      - name: Merge workbooks into resources
        run: |
          set -euo pipefail
          cp -r Build/Workbooks-en_US-Letter/* Build/Resources-en_US/

      - name: Save Links.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: Build/Resources-en_US/Links.json
          key: links-en_US-${{ hashFiles('Chapters/**') }}

      - name: Save apt cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}

      - name: Save pip cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Build/requirements.txt') }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: resources-build
          path: Build/Resources-en_US/
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-all]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 30
    steps:
      - name: Ensure deploy token exists
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DEPLOY_TOKEN" ]]; then
            echo "DEPLOY_TOKEN is not configured."
            exit 1
          fi

      - name: Checkout kontinuafoundation.github.io
        uses: actions/checkout@v4
        with:
          repository: kontinuafoundation/kontinuafoundation.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: kontinuafoundation.github.io
          fetch-depth: 1

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: resources-build
          path: Build/Resources-en_US/

      - name: Deploy to kontinuafoundation.github.io
        env:
          DEPLOY_BRANCH: main
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          cd kontinuafoundation.github.io

          test -d ../Build/Resources-en_US
          rsync -av --delete ../Build/Resources-en_US/ ./Resources-en_US/

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git commit -m "Deploy site: $(date -u +"%Y-%m-%d %H:%M:%SZ")"
            git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/kontinuafoundation/kontinuafoundation.github.io.git"
            git push origin "$DEPLOY_BRANCH"
          else
            echo "No changes to deploy."
          fi
