name: Deploy to Kontinua

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-chapters:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Restore caches
        uses: actions/cache/restore@v4
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/pip
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-
            ${{ runner.os }}-pip-

      - name: Install LaTeX and Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments \
            rsync
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Verify LaTeX Tools
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          cfg = {
              "Languages": ["en_US"],
              "Paper": "Letter",
              "LatexExecutable": "lualatex",
          }
          with open("Build/user.cfg", "w", encoding="utf-8") as fp:
              json.dump(cfg, fp, indent=2)
          print("Created Build/user.cfg")
          PY

      - name: Build all chapters
        shell: bash
        run: |
          set -euo pipefail
          cd Build
          python3 make_chapter_pdfs.py en_US --force

      - name: Save caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/pip
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}

      - name: Upload chapters artifact
        uses: actions/upload-artifact@v4
        with:
          name: chapters-build
          path: Build/Resources-en_US/
          if-no-files-found: error

  build-workbooks:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Restore caches
        uses: actions/cache/restore@v4
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/pip
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-
            ${{ runner.os }}-pip-

      - name: Install LaTeX and Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments \
            rsync
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Verify LaTeX Tools
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          cfg = {
              "Languages": ["en_US"],
              "Paper": "Letter",
              "LatexExecutable": "lualatex",
          }
          with open("Build/user.cfg", "w", encoding="utf-8") as fp:
              json.dump(cfg, fp, indent=2)
          print("Created Build/user.cfg")
          PY

      - name: Build all workbooks
        shell: bash
        run: |
          set -euo pipefail
          cd Build
          python3 build_workbook.py all

      - name: Save caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/pip
          key: ${{ runner.os }}-apt-${{ hashFiles('Build/requirements.txt') }}

      - name: Upload workbooks artifact
        uses: actions/upload-artifact@v4
        with:
          name: workbooks-build
          path: Build/Workbooks-en_US-Letter/
          if-no-files-found: error

  gather-resources:
    runs-on: ubuntu-latest
    needs: [build-chapters, build-workbooks]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download chapters artifact
        uses: actions/download-artifact@v4
        with:
          name: chapters-build
          path: Build/Resources-en_US/

      - name: Download workbooks artifact
        uses: actions/download-artifact@v4
        with:
          name: workbooks-build
          path: Build/Workbooks-en_US-Letter/

      - name: Restore Links.json cache
        id: links-cache
        uses: actions/cache/restore@v4
        with:
          path: Build/Resources-en_US/Links.json
          key: links-en_US-${{ hashFiles('Chapters/**') }}

      - name: Ensure Resources directory exists
        run: |
          set -euo pipefail
          mkdir -p Build/Resources-en_US

      - name: Run gather and url_check
        shell: bash
        run: |
          set -euo pipefail
          cd Build

          python3 gather_resources.py || (echo "gather_resources.py failed" && exit 1)
          python3 url_check.py 90 || (echo "url_check.py failed" && exit 1)

          test -f Resources-en_US/Links.json

      - name: Save Links.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: Build/Resources-en_US/Links.json
          key: links-en_US-${{ hashFiles('Chapters/**') }}

  post-process:
    runs-on: ubuntu-latest
    needs: [build-chapters, build-workbooks, gather-resources]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download chapters artifact
        uses: actions/download-artifact@v4
        with:
          name: chapters-build
          path: Build/Resources-en_US/

      - name: Download workbooks artifact
        uses: actions/download-artifact@v4
        with:
          name: workbooks-build
          path: Build/Workbooks-en_US-Letter/

      - name: Concatenate chapters
        run: bash Build/concat_chaps.bash

      - name: Merge workbooks into Resources
        run: |
          set -euo pipefail
          cp -r Build/Workbooks-en_US-Letter/* Build/Resources-en_US/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: resources-build
          path: Build/Resources-en_US/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: [post-process]
    if: (github.event_name != 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true') && secrets.DEPLOY_TOKEN != ''

    steps:
      - name: Checkout kontinuafoundation.github.io
        uses: actions/checkout@v4
        with:
          repository: kontinuafoundation/kontinuafoundation.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: kontinuafoundation.github.io
          fetch-depth: 1

      - name: Download resources artifact
        uses: actions/download-artifact@v4
        with:
          name: resources-build
          path: Build/Resources-en_US/

      - name: Deploy to kontinuafoundation.github.io
        env:
          DEPLOY_BRANCH: main
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          cd kontinuafoundation.github.io

          test -d ../Build/Resources-en_US
          rsync -av --delete ../Build/Resources-en_US/ ./Resources-en_US/

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git commit -m "Deploy site: $(date -u +"%Y-%m-%d %H:%M:%SZ")"
            git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/kontinuafoundation/kontinuafoundation.github.io.git"
            git push origin "$DEPLOY_BRANCH"
          else
            echo "No changes to deploy."
          fi
