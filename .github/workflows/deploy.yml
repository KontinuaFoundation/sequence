name: Full Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-chapters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Restore caches
        uses: actions/cache/restore@v4
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/pip
          key: ${{ runner.os }}-apt-${{ github.job }}-${{
            hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-${{ github.job }}-
            ${{ runner.os }}-apt-
            ${{ runner.os }}-pip-

      - name: Install LaTeX and Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Verify LaTeX Tools
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          cfg = {
              "Languages": ["en_US"],
              "Paper": "Letter",
              "LatexExecutable": "lualatex",
          }
          with open("Build/user.cfg", "w", encoding="utf-8") as fp:
              json.dump(cfg, fp, indent=2)
          print("Created Build/user.cfg")
          PY

      - name: Build all chapters
        shell: bash
        run: |
          set -euo pipefail
          cd Build
          python3 make_chapter_pdfs.py en_US --force

      - name: Save caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ github.job }}-${{
            hashFiles('Build/requirements.txt') }}

      - name: Upload chapters artifact
        uses: actions/upload-artifact@v4
        with:
          name: chapters-build
          path: Build/Resources-en_US/
          if-no-files-found: error

  build-workbooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Restore caches
        uses: actions/cache/restore@v4
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/pip
          key: ${{ runner.os }}-apt-${{ github.job }}-${{
            hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-${{ github.job }}-
            ${{ runner.os }}-apt-
            ${{ runner.os }}-pip-

      - name: Install LaTeX and Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Verify LaTeX Tools
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          cfg = {
              "Languages": ["en_US"],
              "Paper": "Letter",
              "LatexExecutable": "lualatex",
          }
          with open("Build/user.cfg", "w", encoding="utf-8") as fp:
              json.dump(cfg, fp, indent=2)
          print("Created Build/user.cfg")
          PY

      - name: Build all workbooks
        shell: bash
        run: |
          set -euo pipefail
          cd Build
          python3 build_workbook.py all

      - name: Save pip cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ github.job }}-${{
            hashFiles('Build/requirements.txt') }}

      - name: Upload workbooks artifact
        uses: actions/upload-artifact@v4
        with:
          name: workbooks-build
          path: |
            Build/Workbooks-en_US-Letter/
          if-no-files-found: error

  gather-resources:
    runs-on: ubuntu-latest
    needs: [ build-chapters, build-workbooks ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Download chapters artifact
        uses: actions/download-artifact@v4
        with:
          name: chapters-build
          path: Build/Resources-en_US/

      - name: Download workbooks artifact
        uses: actions/download-artifact@v4
        with:
          name: workbooks-build
          path: Build/Workbooks-en_US-Letter/
          
      - name: Fetch Links.json from deployed site
        run: |
          set -euo pipefail

          mkdir -p Build/Resources-en_US

          # Use a temporary file for download to avoid partial/corrupted files
          TEMP_LINKS="/tmp/Links.json.tmp"
          rm -f "$TEMP_LINKS"

          # Try to fetch the Links.json file
          if curl -f -L \
            https://raw.githubusercontent.com/KontinuaFoundation/kontinuafoundation.github.io/main/public/Links.json \
            -o "$TEMP_LINKS" 2>/dev/null; then
            # Validate the JSON is valid before moving it
            if python3 -c "import json; json.load(open('$TEMP_LINKS'))" 2>/dev/null; then
              mv "$TEMP_LINKS" Build/Resources-en_US/Links.json
            else
              echo "Downloaded file is not valid JSON, using empty object"
              echo "{}" > Build/Resources-en_US/Links.json
              rm -f "$TEMP_LINKS"
            fi
          else
            # Fetch failed, use empty object
            echo "Failed to fetch Links.json from deployed site, using empty object"
            echo "{}" > Build/Resources-en_US/Links.json
          fi

          # Verify Links.json exists and is valid JSON
          test -f Build/Resources-en_US/Links.json
          python3 -c "import json; json.load(open('Build/Resources-en_US/Links.json'))" || (echo "Links.json is not valid JSON" && exit 1)

      - name: Ensure Resources directory exists
        run: |
          set -euo pipefail
          mkdir -p Build/Resources-en_US

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r Build/requirements.txt

      - name: Run deploy scripts
        shell: bash
        run: |
          set -euo pipefail
          cd Build

          python3 gather_resources.py 90 || (echo "gather_resources.py failed" && exit 1)
          python3 build_chapterlist.py || (echo "build_chapterlist.py failed" && exit 1)
          python3 topo_sort.py || (echo "topo_sort.py failed" && exit 1)
          python3 url_check.py || (echo "url_check.py failed" && exit 1)

          test -f Resources-en_US/Links.json

      - name: Upload gathered resources artifact
        uses: actions/upload-artifact@v4
        with:
          name: gathered-resources
          path: Build/Resources-en_US/
          if-no-files-found: error

      - name: Save Links.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: Build/Resources-en_US/Links.json
          key: links-en_US-${{ github.job }}-${{ hashFiles('Chapters/**') }}

  post-process:
    runs-on: ubuntu-latest
    needs: [ gather-resources, build-workbooks ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Download gathered resources artifact
        uses: actions/download-artifact@v4
        with:
          name: gathered-resources
          path: Build/Resources-en_US/

      - name: Download workbooks artifact
        uses: actions/download-artifact@v4
        with:
          name: workbooks-build
          path: Build/Workbooks-en_US-Letter/

      - name: Concatenate chapters
        run: |
          set -euo pipefail
          cd Chapters
          : > book_00.txt
          for i in $(seq -w 1 36); do
            cat "book_$i.txt" >> book_00.txt
          done

      - name: Copy resources to workbooks
        run: |
          set -euo pipefail
          cp -r Build/Workbooks-en_US-Letter/* Build/Resources-en_US/
        
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: resources-build
          path: Build/Resources-en_US/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: [ post-process ]

    steps:
      - name: Download resources artifact
        uses: actions/download-artifact@v4
        with:
          name: resources-build
          path: resources/

      - name: Set deploy timestamp
        id: ts
        run: echo "ts=$(date -u +'%Y-%m-%d %H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Deploy to kontinuafoundation.github.io
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository-name: kontinuafoundation/kontinuafoundation.github.io
          branch: main
          folder: resources
          target-folder: public
          clean: false
          force: false
          commit-message: "Deploy site: ${{ steps.ts.outputs.ts }}"
