name: Deploy to Kontinua

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sequence repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # TODO: Re-enable once DEPLOY_TOKEN secret is configured (needs write access to kontinuafoundation.github.io).
      - name: Checkout kontinuafoundation.github.io
        uses: actions/checkout@v4
        with:
          repository: kontinuafoundation/kontinuafoundation.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: kontinuafoundation.github.io
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore apt cache
        uses: actions/cache/restore@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/deploy.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-base \
            texlive-binaries \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pstricks \
            fonts-open-sans \
            python3-pygments \
            rsync
          sudo mkdir -p /usr/share/fonts/truetype/kontinua
          sudo cp Build/Support/fonts/*.ttf /usr/share/fonts/truetype/kontinua/
          sudo fc-cache -fv
          luaotfload-tool --update
      - name: Restore pip cache
        uses: actions/cache/restore@v4
        id: pip-cache
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: python3 -m pip install -r Build/requirements.txt


      - name: Verify LaTeX Tools
        run: |
          which pygmentize
          pygmentize -V
          which kpsewhich
          kpsewhich minted.sty
          kpsewhich algpseudocode.sty

      - name: Prepare build config
        shell: bash
        run: |
          python3 - <<'PY'
          import json

          cfg = {
              "Languages": ["en_US"],
              "Paper": "Letter",
              "LatexExecutable": "lualatex",
          }
          with open("Build/user.cfg", "w", encoding="utf-8") as fp:
              json.dump(cfg, fp, indent=2)
          print("Created Build/user.cfg for CI")
          PY
      - name: Ensure Resources directory exists
        run: |
          set -euo pipefail
          mkdir -p Build/Resources-en_US
          ls -ld Build/Resources-en_US

      - name: Restore Links.json cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: Build/Resources-en_US/Links.json
          # key: links-en_US-${{ hashFiles('Chapters/**') }}
          key: links-en_US

      - name: Run helper scripts
        shell: bash
        run: |
          set -euo pipefail
          cd Build

          python3 url_check.py 90 || (echo "url_check.py failed" && exit 1)
          echo "Checking Links.json exists..."
          test -f Resources-en_US/Links.json

          python3 gather_resources.py || (echo "gather_resources.py failed" && exit 1)
          # python3 gather.py || (echo "gather.py failed" && exit 1)

          python3 make_chapter_pdfs.py en_US &
          pid1=$!
          python3 build_chapterlist.py &
          pid2=$!
          wait $pid1 || (echo "make_chapter_pdfs.py failed" && exit 1)
          wait $pid2 || (echo "build_chapterlist.py failed" && exit 1)

      - name: Concatenate chapters
        run: bash Build/concat_chaps.bash

      - name: Save Links.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: Build/Resources-en_US/Links.json
          key: links-en_US-${{ hashFiles('Chapters/**') }}
      # TODO: Add steps
      # Rebuild all workbooks
      # Copy all workbooks from the Workbooks-en_US-Letter directory to the resources-en_US directory.

      # TODO: Re-enable this step once a deploy token (with write access to
      # kontinuafoundation/kontinuafoundation.github.io) is added as a repo
      # secret and wired into the checkout step above via `token: ${{ secrets.DEPLOY_TOKEN }}`.
      - name: Deploy to kontinuafoundation.github.io
        env:
          DEPLOY_BRANCH: main
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          cd kontinuafoundation.github.io

          test -d ../Build/Resources-en_US
          rsync -av --delete ../Build/Resources-en_US/ ./Resources-en_US/

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git commit -m "Deploy site: $(date -u +"%Y-%m-%d %H:%M:%SZ")"
            git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/kontinuafoundation/kontinuafoundation.github.io.git"
            git push origin "$DEPLOY_BRANCH"
          else
            echo "No changes to deploy."
          fi
      # - name: Deploy skipped (no token configured)
      #   run: echo "Deploy step disabled until DEPLOY_TOKEN secret is configured."